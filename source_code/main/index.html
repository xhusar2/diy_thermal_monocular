<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thermal Monocular · Settings</title>
  <style>
    :root {
      --text_color: #e8e6e3;
      --text_muted: #9ca3af;
      --bg_dark: #0d0f12;
      --bg_card: #161a1f;
      --bg_input: #1e2329;
      --accent_warm: #e85d2e;
      --accent_cool: #2dd4e8;
      --border: #2a2e35;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background-color: var(--bg_dark);
      color: var(--text_color);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      min-height: 100vh;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 12px 24px;
    }

    header {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
    }

    header p {
      font-size: 0.8rem;
      color: var(--text_muted);
      margin: 4px 0 0;
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text_muted);
      margin: 20px 0 8px;
      padding: 0 4px;
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
    }

    .main > div {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      padding: 10px 14px;
      margin: 4px 0;
      background: var(--bg_card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .main > div > label:first-child {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .main > div > div {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    select {
      font-size: 1rem;
      color: var(--text_color);
      background-color: var(--bg_input);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 8px;
      min-width: 140px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: var(--accent_warm);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--border);
      transition: 0.25s;
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.25s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--accent_warm);
    }

    input:focus + .slider {
      box-shadow: 0 0 0 2px var(--bg_dark), 0 0 0 4px var(--accent_warm);
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    button {
      font-size: 1rem;
      color: var(--text_color);
      background-color: var(--bg_input);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      min-height: 44px;
    }

    button:focus {
      outline: none;
      border-color: var(--accent_warm);
    }

    input[type="range"] {
      width: 100%;
      max-width: 200px;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 4px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent_warm);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent_warm);
      cursor: pointer;
      border: none;
    }

    .zoom_slider {
      width: 100%;
      max-width: 200px;
    }

    #zoom_div > div {
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Thermal Monocular</h1>
      <p>Settings</p>
    </header>

    <p class="section-title">Image</p>
    <div class="main">
      <div id="preset_div">
        <label>Preset</label>
        <div>
          <select onchange="updateValue(this.id, this.value)" id="active_profile"></select>
        </div>
      </div>
      <div id="preset_en_div">
        <label>Preset Active</label>
        <div>
          <label class="switch">
            <input id="preset_en" onchange="updateValue(this.id, this.checked ? 1 : 0)" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <!--
      <div id="color_div">
        <label>Color Palette</label>
        <div>
          <select onchange="updateValue(this.id, this.value)" id="pseudo_color">
            <option value="0">WHOT</option>
            <option value="10">BHOT</option>
          </select>
        </div>
      </div>
      -->
      <div id="scene_div">
        <label>Scene Mode</label>
        <div>
          <select onchange="updateValue(this.id, this.value)" id="scene_mode">
            <option value="0">LowHighlight</option>
            <option value="1">LinearStretch</option>
            <option value="2">LowContrast</option>
            <option value="3" selected>GeneralMode</option>
            <option value="4">HighContrast</option>
            <option value="5">Highlight</option>
            <option value="9">Outline</option>
          </select>
        </div>
      </div>
      <div id="edges_div">
        <label>Edges</label>
        <div>
          <input type="range" id="edge_enhancment_gear" min="0" max="2" value="0" oninput="updateValue(this.id, this.value)">
        </div>
      </div>
      <div id="contrast_div">
        <label>Contrast</label>
        <div>
          <input type="range" id="contrast" min="0" max="100" value="0" oninput="updateValue(this.id, this.value)">
        </div>
      </div>
      <div id="detail_div">
        <label>Detail</label>
        <div>
          <input type="range" id="detail_enhancement_gear" min="0" max="100" value="0" oninput="updateValue(this.id, this.value)">
        </div>
      </div>
      <!--
      <div id="fix_div">
        <label>Fixes</label>
        <div>
          <button onclick="updateValue('save_video', 1)">Video</button>
          <button onclick="updateValue('resend', 1)">Resend</button>
        </div>
      </div>
      -->
    </div>

    <!--
    <p class="section-title">Camera</p>
    <div class="main">
      <div id="burnprotection_div">
        <label>Burn Protection</label>
        <div>
          <label class="switch">
            <input id="burn_protection_en" onchange="updateValue(this.id, this.checked ? 1 : 0)" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div id="autoshutter_div">
        <label>Auto Shutter</label>
        <div>
          <label class="switch">
            <input id="auto_shutter_en" onchange="updateValue(this.id, this.checked ? 1 : 0)" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
    -->

    <p class="section-title">Alignment</p>
    <div class="main">
      <div id="flip_div">
        <label>Flip Mode</label>
        <div>
          <select onchange="updateValue(this.id, this.value)" id="flip_mode">
            <option value="0">No-Flip</option>
            <option value="1">X-Flip</option>
            <option value="2">Y-Flip</option>
            <option value="3">XY-Flip</option>
          </select>
        </div>
      </div>
      <div id="av_format_div">
        <label>Video format</label>
        <div>
          <select onchange="updateValue(this.id, this.value)" id="av_format">
            <option value="0">NTSC</option>
            <option value="1" selected>PAL</option>
          </select>
        </div>
      </div>
      <!--
      <div id="refresh_flip_mode_div">
        <label>Periodically Refresh</label>
        <div>
          <label class="switch">
            <input id="refresh_flip_mode" onchange="updateValue(this.id, this.checked ? 1 : 0)" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      -->
      <div id="zoom_div">
        <label>Zoom / X / Y</label>
        <div style="display: flex; flex-direction: column;">
          <input class="zoom_slider" type="range" id="zoom" min="10" max="15" value="10" onchange="updateZoom()">
          <input class="zoom_slider" type="range" id="zoom_x" min="0" max="255" value="0" onchange="updateZoom()">
          <input class="zoom_slider" type="range" id="zoom_y" min="0" max="191" value="0" onchange="updateZoom()">
        </div>
      </div>
    </div>
  </div>

  <script>
    let sensor_width = 256;
    let sensor_height = 192;

    function updateZoomLimits() {
      const zoom = document.getElementById("zoom");
      const zoom_x = document.getElementById("zoom_x");
      const zoom_y = document.getElementById("zoom_y");

      const x_room = Math.ceil((sensor_width - (sensor_width / (parseInt(zoom.value, 10) / 10))) / 2);
      const y_room = Math.ceil((sensor_height - (sensor_height / (parseInt(zoom.value, 10) / 10))) / 2);
      zoom_x.min = (sensor_width / 2) - x_room;
      zoom_x.max = (sensor_width / 2) + x_room;
      zoom_y.min = (sensor_height / 2) - y_room;
      zoom_y.max = (sensor_height / 2) + y_room;
    }

    function updateZoom() {
      updateZoomLimits();

      const zoom = parseInt(document.getElementById("zoom").value, 10);
      const zoom_x = parseInt(document.getElementById("zoom_x").value, 10);
      const zoom_y = parseInt(document.getElementById("zoom_y").value, 10);
      fetch("/set", {
        method: "POST",
        body: JSON.stringify({ zoom: {
          zoom: zoom,
          x: zoom_x,
          y: zoom_y
        }})
      });
    }

    function updateValue(key, value) {
      if (key === "flip_mode") {
        const zoom_div = document.getElementById("zoom_div");
        if (value === "0") {
          zoom_div.style.display = "grid";
        } else {
          zoom_div.style.display = "none";
        }
      }
      const parsedValue = parseInt(value, 10);
      console.log(`Updating ${key} with value: ${parsedValue}`);
      fetch("/set", {
        method: "POST",
        body: JSON.stringify({ [key]: parsedValue })
      }).then(response => {
        if (key === "active_profile") {
          sync_data();
        }
      });
    }

    function updateRemoteValue(key, source) {
      updateValue(key, document.getElementById(source).value);
    }

    function sync_data() {
      fetch('/get')
      .then(response => {
        return response.json();
      })
      .then(data => {
        console.log("Syncing data:", data);
        for (const key in data) {
          if (key === "sensor_width") {
            sensor_width = data[key];
            updateZoomLimits();
          } else if (key === "sensor_height") {
            sensor_height = data[key];
            updateZoomLimits();
          } else if (key === "zoom_x") {
            document.getElementById("zoom_x").value = data[key];
          } else if (key === "zoom_y") {
            document.getElementById("zoom_y").value = data[key];
          } else if (key === "zoom") {
            document.getElementById("zoom").value = data[key];
          } else if (key === "auto_shutter_en" || key === "burn_protection_en" || key === "preset_en" || key === "refresh_flip_mode") {
            document.getElementById(key).checked = data[key];
          } else if (key === "preset_count") {
            const select = document.getElementById("active_profile");
            if (select.options.length === 0) {
              select.innerHTML = "";
              for (let i = 0; i < data[key]; i++) {
                const option = document.createElement("option");
                option.value = i;
                option.textContent = `Preset ${i}`;
                select.appendChild(option);
              }
            }
          } else if (key === "active_profile") {
              const select = document.getElementById("active_profile");
              select.value = data[key];
          } else {
            if (key === "flip_mode") {
              const zoom_div = document.getElementById("zoom_div");
              if (data[key] === 0) {
                zoom_div.style.display = "grid";
              } else {
                zoom_div.style.display = "none";
              }
            }

            const element = document.getElementById(key);
            if (element === null) {
              console.log("Cant find " + key);
              continue;
            }
            element.value = data[key];
          }
        }
      })
      .catch(error => {
        console.error('Can\'t fetch from `/get`, values may be desynced', error);
      });
    }

    sync_data();
  </script>
</body>
</html>
